server {
    listen 80;
    server_name _;

    # API → backend container (giữ nguyên prefix /api)
    location /api/ {
        proxy_pass http://backend:8077;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50m;       # cho upload audio
        proxy_read_timeout 180s;        # STT có thể lâu
        proxy_send_timeout 180s;
    }

    # SPA tĩnh
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
